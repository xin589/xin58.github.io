<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灵感工坊 · 作品管理</title>
    <style>
        /* ---------- 全局样式 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0b0d15;
            color: #e5e9f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: linear-gradient(145deg, #0b0d15 0%, #1a1e2f 100%);
        }
        .app-wrapper {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ---------- 登录/注册界面 ---------- */
        .auth-container {
            max-width: 440px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
        }
        .auth-container h1 {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #b6c8ff, #8a6cff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .auth-container .sub {
            text-align: center;
            color: #7a89aa;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }
        .auth-container label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #a4b0cc;
            margin-bottom: 0.3rem;
            margin-top: 1rem;
        }
        .auth-container input {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }
        .auth-container input:focus {
            border-color: #8a6cff;
        }
        .auth-container .btn {
            width: 100%;
            padding: 0.7rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 1rem;
            background: linear-gradient(135deg, #6f55e0, #8a6cff);
            color: #fff;
            box-shadow: 0 4px 14px rgba(138, 108, 255, 0.3);
        }
        .auth-container .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 24px rgba(138, 108, 255, 0.45);
        }
        .auth-container .btn-outline-sm {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #d0d9f0;
            padding: 0.4rem 0.8rem;
            border-radius: 60px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            height: 38px;
            line-height: 1;
        }
        .auth-container .btn-outline-sm:hover {
            background: rgba(255, 255, 255, 0.06);
        }
        .auth-container .btn-outline-sm:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .auth-container .toggle-link {
            text-align: center;
            margin-top: 1.2rem;
            color: #7a89aa;
            font-size: 0.9rem;
        }
        .auth-container .toggle-link a {
            color: #8a6cff;
            cursor: pointer;
            text-decoration: underline;
        }
        .auth-container .error-msg {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            text-align: center;
            min-height: 1.5rem;
        }
        .auth-container .success-msg {
            color: #8affb6;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            text-align: center;
            min-height: 1.5rem;
        }
        .code-row {
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }
        .code-row input {
            flex: 1;
            min-width: 0;
        }
        .code-row button {
            flex-shrink: 0;
            margin-top: 0;
        }

        /* ---------- 主界面（登录后） ---------- */
        .main-app {
            display: none;
        }
        .main-app.active {
            display: block;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 2rem;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #b6c8ff, #8a6cff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .toolbar {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .user-info {
            color: #8e9bbe;
            font-size: 0.9rem;
            margin-right: 0.5rem;
        }
        .btn {
            padding: 0.5rem 1.4rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: all 0.25s ease;
            background: #2a2f45;
            color: #d0d9f0;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6f55e0, #8a6cff);
            color: #fff;
            box-shadow: 0 4px 14px rgba(138, 108, 255, 0.3);
        }
        .btn-primary:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 24px rgba(138, 108, 255, 0.45);
        }
        .btn-danger {
            background: #c0392b;
            color: #fff;
        }
        .btn-danger:hover {
            background: #e74c3c;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.06);
        }
        .btn-sm {
            padding: 0.25rem 1rem;
            font-size: 0.8rem;
        }

        .stats {
            color: #7a89aa;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #7a89aa;
        }
        .empty-state .big-icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 1rem;
        }
        .empty-state h3 {
            color: #e5e9f0;
            margin-bottom: 0.5rem;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin-top: 0.5rem;
        }
        .project-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .project-card:hover {
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(138, 108, 255, 0.25);
            box-shadow: 0 12px 30px -12px rgba(0, 0, 0, 0.6);
        }
        .project-cover {
            width: 100%;
            height: 180px;
            background: #1a1e2f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            overflow: hidden;
            flex-shrink: 0;
        }
        .project-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .project-cover .placeholder-icon {
            opacity: 0.3;
        }
        .project-body {
            padding: 1.2rem 1.4rem 1.4rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .project-type {
            display: inline-block;
            font-size: 0.7rem;
            background: rgba(138, 108, 255, 0.15);
            color: #b6a6ff;
            padding: 0.15rem 0.8rem;
            border-radius: 20px;
            align-self: flex-start;
            margin-bottom: 0.5rem;
        }
        .project-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }
        .project-desc {
            font-size: 0.9rem;
            color: #8e9bbe;
            line-height: 1.5;
            flex: 1;
            margin-bottom: 0.8rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 0.8rem;
        }
        .project-tags span {
            background: rgba(255, 255, 255, 0.06);
            padding: 0.1rem 0.7rem;
            border-radius: 12px;
            font-size: 0.7rem;
            color: #a4b0cc;
        }
        .project-link {
            color: #8a6cff;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.8rem;
            word-break: break-all;
        }
        .project-link:hover {
            text-decoration: underline;
        }
        .project-actions {
            display: flex;
            gap: 0.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 0.8rem;
            margin-top: auto;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #1a1e2f;
            border-radius: 2rem;
            max-width: 560px;
            width: 100%;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }
        .modal label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #a4b0cc;
            margin-bottom: 0.3rem;
            margin-top: 1rem;
        }
        .modal input,
        .modal select,
        .modal textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border 0.2s;
        }
        .modal input:focus,
        .modal select:focus,
        .modal textarea:focus {
            border-color: #8a6cff;
        }
        .modal textarea {
            min-height: 80px;
            resize: vertical;
        }
        .modal .preview-img {
            margin-top: 0.5rem;
            max-height: 120px;
            border-radius: 0.8rem;
            overflow: hidden;
            display: none;
        }
        .modal .preview-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .modal .form-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.8rem;
        }
        .modal .form-actions .btn {
            flex: 1;
        }

        @media (max-width: 640px) {
            .navbar {
                flex-direction: column;
                align-items: stretch;
            }
            .toolbar {
                justify-content: flex-start;
            }
            .modal {
                padding: 1.5rem;
            }
            .project-grid {
                grid-template-columns: 1fr 1fr;
            }
            .auth-container {
                padding: 1.5rem;
            }
            .code-row {
                flex-wrap: wrap;
            }
            .code-row button {
                width: 100%;
                height: 44px;
            }
        }
        @media (max-width: 420px) {
            .project-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <!-- ========== 登录 / 注册界面 ========== -->
        <div id="authContainer" class="auth-container">
            <h1>✦ 灵感工坊</h1>
            <div class="sub">登录以管理你的作品</div>

            <!-- 登录表单 -->
            <form id="loginForm">
                <label for="loginEmail">邮箱</label>
                <input type="email" id="loginEmail" placeholder="your@email.com" required />
                <label for="loginPassword">密码</label>
                <input type="password" id="loginPassword" placeholder="至少6位" required minlength="6" />
                <button type="submit" class="btn">登 录</button>
                <div class="error-msg" id="loginError"></div>
                <div class="success-msg" id="loginSuccess"></div>
            </form>

            <div class="toggle-link">
                还没有账号？ <a id="showRegister">立即注册</a>
            </div>

            <!-- 注册表单 -->
            <form id="registerForm" style="display:none; margin-top: 1rem;">
                <label for="registerEmail">邮箱</label>
                <input type="email" id="registerEmail" placeholder="your@email.com" required />

                <label for="registerPassword">密码</label>
                <input type="password" id="registerPassword" placeholder="至少6位" required minlength="6" />

                <label for="registerCode">邮箱验证码</label>
                <div class="code-row">
                    <input type="text" id="registerCode" placeholder="6位验证码" required />
                    <button type="button" class="btn-outline-sm" id="getCodeBtn">获取验证码</button>
                </div>

                <button type="submit" class="btn">注 册</button>
                <div class="error-msg" id="registerError"></div>
                <div class="success-msg" id="registerSuccess"></div>
            </form>

            <div class="toggle-link" id="showLoginLink" style="display:none;">
                已有账号？ <a id="showLogin">去登录</a>
            </div>
        </div>

        <!-- ========== 主应用（登录后） ========== -->
        <div id="mainApp" class="main-app">
            <header class="navbar">
                <div class="logo">✦ 灵感工坊</div>
                <div class="toolbar">
                    <span class="user-info" id="userEmail"></span>
                    <button class="btn btn-outline btn-sm" id="exportBtn">📥 导出备份</button>
                    <button class="btn btn-outline btn-sm" id="importBtn">📤 导入备份</button>
                    <button class="btn btn-primary" id="addBtn">＋ 添加作品</button>
                    <button class="btn btn-danger btn-sm" id="logoutBtn">退出</button>
                </div>
                <input type="file" id="importFileInput" accept=".json" style="display:none" />
            </header>

            <div class="stats" id="statsText">加载中...</div>
            <div class="project-grid" id="projectGrid"></div>
            <div class="empty-state" id="emptyState" style="display:none;">
                <span class="big-icon">🖼️</span>
                <h3>还没有作品</h3>
                <p>点击「添加作品」开始记录你的创作吧！</p>
            </div>
        </div>

        <!-- ========== 模态框（添加/编辑） ========== -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal">
                <div class="modal-title" id="modalTitle">添加作品</div>
                <form id="projectForm">
                    <input type="hidden" id="editId" value="" />
                    <label for="formTitle">作品名称 *</label>
                    <input type="text" id="formTitle" placeholder="例如：个人品牌官网" required />
                    <label for="formType">作品类型</label>
                    <select id="formType">
                        <option value="网站">🌐 网站</option>
                        <option value="App">📱 App</option>
                        <option value="设计">🎨 设计</option>
                        <option value="文章">✍️ 文章</option>
                        <option value="视频">🎬 视频</option>
                        <option value="音乐">🎵 音乐</option>
                        <option value="其他">📦 其他</option>
                    </select>
                    <label for="formDesc">简短描述</label>
                    <textarea id="formDesc" placeholder="简单介绍这个作品..."></textarea>
                    <label for="formTags">技术标签（用逗号分隔）</label>
                    <input type="text" id="formTags" placeholder="例如：React, Figma, Tailwind" />
                    <label for="formUrl">项目链接（可选）</label>
                    <input type="url" id="formUrl" placeholder="https://example.com" />
                    <label for="formImage">封面图片</label>
                    <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
                        <input type="url" id="formImageUrl" placeholder="https://... 图片地址" style="flex:1;" />
                        <label class="btn btn-outline btn-sm" style="cursor:pointer; padding:0.6rem 1.2rem; background:#2a2f45;">
                            📁 上传图片
                            <input type="file" id="formImageFile" accept="image/*" style="display:none;" />
                        </label>
                    </div>
                    <div class="preview-img" id="formImagePreview">
                        <img id="previewImg" src="" alt="封面预览" />
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-outline" id="cancelBtn">取消</button>
                        <button type="submit" class="btn btn-primary" id="submitBtn">保存作品</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- ========== 引入 CloudBase SDK ========== -->
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/2.17.3/cloudbase.full.js">
    </script>

    <script>
        // ============================================================
        // 🔥 只需要替换这一行：把你的环境 ID 填进去！
        // ============================================================
        const ENV_ID = 'my-portfolio-d3gqx38bmf1e0296e'; // 👈 改成你的，例如 'my-portfolio-xxxxx'

        // ============================================================
        // 初始化 CloudBase
        // ============================================================
        const app = cloudbase.init({ env: ENV_ID });
        const auth = app.auth();
        const db = app.database();

        // ============================================================
        // DOM 引用
        // ============================================================
        const authContainer = document.getElementById('authContainer');
        const mainApp = document.getElementById('mainApp');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const showRegisterLink = document.getElementById('showRegister');
        const showLoginLink = document.getElementById('showLoginLink');
        const showLoginBtn = document.getElementById('showLogin');
        const loginError = document.getElementById('loginError');
        const loginSuccess = document.getElementById('loginSuccess');
        const registerError = document.getElementById('registerError');
        const registerSuccess = document.getElementById('registerSuccess');
        const userEmailSpan = document.getElementById('userEmail');
        const logoutBtn = document.getElementById('logoutBtn');

        const grid = document.getElementById('projectGrid');
        const emptyState = document.getElementById('emptyState');
        const statsText = document.getElementById('statsText');
        const addBtn = document.getElementById('addBtn');
        const exportBtn = document.getElementById('exportBtn');
        const importBtn = document.getElementById('importBtn');
        const importFileInput = document.getElementById('importFileInput');

        const modalOverlay = document.getElementById('modalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const projectForm = document.getElementById('projectForm');
        const editIdInput = document.getElementById('editId');
        const formTitle = document.getElementById('formTitle');
        const formType = document.getElementById('formType');
        const formDesc = document.getElementById('formDesc');
        const formTags = document.getElementById('formTags');
        const formUrl = document.getElementById('formUrl');
        const formImageUrl = document.getElementById('formImageUrl');
        const formImageFile = document.getElementById('formImageFile');
        const previewContainer = document.getElementById('formImagePreview');
        const previewImg = document.getElementById('previewImg');
        const submitBtn = document.getElementById('submitBtn');
        const cancelBtn = document.getElementById('cancelBtn');

        // 注册专用
        const registerEmail = document.getElementById('registerEmail');
        const registerPassword = document.getElementById('registerPassword');
        const registerCode = document.getElementById('registerCode');
        const getCodeBtn = document.getElementById('getCodeBtn');

        let currentUser = null;
        let allProjects = [];
        let currentImageData = '';
        let verificationId = null;

        // ============================================================
        // 切换登录/注册表单
        // ============================================================
        showRegisterLink.addEventListener('click', () => {
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            showRegisterLink.parentElement.style.display = 'none';
            showLoginLink.style.display = 'block';
            loginError.textContent = '';
            loginSuccess.textContent = '';
            registerError.textContent = '';
            registerSuccess.textContent = '';
        });
        showLoginBtn.addEventListener('click', () => {
            registerForm.style.display = 'none';
            loginForm.style.display = 'block';
            showLoginLink.style.display = 'none';
            showRegisterLink.parentElement.style.display = 'block';
            registerError.textContent = '';
            registerSuccess.textContent = '';
            loginError.textContent = '';
            loginSuccess.textContent = '';
        });

        // ============================================================
        // 获取验证码
        // ============================================================
        getCodeBtn.addEventListener('click', async () => {
            const email = registerEmail.value.trim();
            if (!email) {
                registerError.textContent = '❌ 请先填写邮箱';
                return;
            }
            registerError.textContent = '';
            registerSuccess.textContent = '';
            try {
                const verification = await auth.getVerification({ email: email });
                verificationId = verification.verification_id;
                registerSuccess.textContent = '📧 验证码已发送，请查看邮箱（含垃圾箱）！';
                getCodeBtn.textContent = '已发送 (60s)';
                getCodeBtn.disabled = true;
                let countdown = 60;
                const timer = setInterval(() => {
                    countdown--;
                    getCodeBtn.textContent = `重新发送 (${countdown}s)`;
                    if (countdown <= 0) {
                        clearInterval(timer);
                        getCodeBtn.textContent = '获取验证码';
                        getCodeBtn.disabled = false;
                    }
                }, 1000);
            } catch (err) {
                // 如果邮箱登录未开启，给出明确提示
                if (err.code === 'LOGIN_TYPE_DISABLED') {
                    registerError.textContent = '❌ 邮箱登录未开启，请在 CloudBase 控制台「身份认证」中开启。';
                } else {
                    registerError.textContent = '❌ 发送失败：' + (err.message || '请检查邮箱是否正确');
                }
                console.error('获取验证码错误:', err);
            }
        });

        // ============================================================
        // 注册（三步流程）
        // ============================================================
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = registerEmail.value.trim();
            const password = registerPassword.value;
            const code = registerCode.value.trim();

            registerError.textContent = '';
            registerSuccess.textContent = '';

            if (!verificationId) {
                registerError.textContent = '❌ 请先点击"获取验证码"';
                return;
            }
            if (!code || code.length !== 6) {
                registerError.textContent = '❌ 请输入6位验证码';
                return;
            }

            try {
                // 1. 验证验证码
                const verifyRes = await auth.verify({
                    verification_id: verificationId,
                    verification_code: code
                });

                // 2. 注册
                await auth.signUp({
                    email: email,
                    verification_code: code,
                    verification_token: verifyRes.verification_token,
                    password: password
                });

                registerSuccess.textContent = '✅ 注册成功！正在跳转...';
                setTimeout(checkAuthState, 800);
            } catch (err) {
                if (err.code === 'LOGIN_TYPE_DISABLED') {
                    registerError.textContent = '❌ 邮箱登录未开启，请在 CloudBase 控制台「身份认证」中开启。';
                } else {
                    registerError.textContent = '❌ ' + (err.message || '注册失败，请重试');
                }
                console.error('注册错误:', err);
            }
        });

        // ============================================================
        // 登录
        // ============================================================
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            loginError.textContent = '';
            loginSuccess.textContent = '';

            try {
                await auth.signIn({
                    email: email,
                    password: password
                });
                loginSuccess.textContent = '✅ 登录成功！';
                setTimeout(checkAuthState, 500);
            } catch (err) {
                loginError.textContent = '❌ ' + (err.message || '登录失败');
                console.error('登录错误:', err);
            }
        });

        // ============================================================
        // 退出
        // ============================================================
        logoutBtn.addEventListener('click', async () => {
            try {
                await auth.signOut();
                setTimeout(checkAuthState, 500);
            } catch (err) {
                console.error('退出错误:', err);
            }
        });

        // ============================================================
        // 检查登录状态
        // ============================================================
        async function checkAuthState() {
            try {
                const user = await auth.getAuthState();
                if (user) {
                    currentUser = user;
                    authContainer.style.display = 'none';
                    mainApp.classList.add('active');
                    userEmailSpan.textContent = user.email || user.uid;
                    await loadProjects();
                } else {
                    currentUser = null;
                    authContainer.style.display = 'block';
                    mainApp.classList.remove('active');
                    allProjects = [];
                    renderProjects();
                }
            } catch (err) {
                console.error('检查登录状态失败:', err);
            }
        }

        // 首次加载检查
        checkAuthState();

        // 监听认证变化（兼容）
        auth.onAuthStateChange && auth.onAuthStateChange(() => {
            checkAuthState();
        });

        // ============================================================
        // 作品数据操作
        // ============================================================
        async function loadProjects() {
            if (!currentUser) return;
            try {
                const res = await db.collection('projects')
                    .where({ userId: currentUser.uid })
                    .get();
                allProjects = res.data || [];
                renderProjects();
            } catch (err) {
                console.error('加载失败:', err);
                statsText.textContent = '加载数据失败，请刷新重试。';
            }
        }

        function renderProjects() {
            if (!allProjects || allProjects.length === 0) {
                grid.innerHTML = '';
                emptyState.style.display = 'block';
                statsText.textContent = '共 0 个作品';
                return;
            }
            emptyState.style.display = 'none';
            statsText.textContent = `共 ${allProjects.length} 个作品`;

            const sorted = [...allProjects].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            let html = '';
            sorted.forEach(p => {
                const typeEmoji = {
                    '网站': '🌐',
                    'App': '📱',
                    '设计': '🎨',
                    '文章': '✍️',
                    '视频': '🎬',
                    '音乐': '🎵',
                    '其他': '📦'
                } [p.type] || '📦';

                let coverHtml = '';
                if (p.image && p.image.startsWith('data:image')) {
                    coverHtml = `<img src="${p.image}" alt="${p.title}" />`;
                } else if (p.image && p.image.startsWith('http')) {
                    coverHtml =
                        `<img src="${p.image}" alt="${p.title}" onerror="this.style.display='none'" />`;
                } else {
                    coverHtml = `<span class="placeholder-icon">${typeEmoji}</span>`;
                }

                let tagsHtml = '';
                if (p.tags && p.tags.length) {
                    tagsHtml = p.tags.map(t => `<span>${t.trim()}</span>`).join('');
                }

                let linkHtml = '';
                if (p.url && p.url.trim()) {
                    linkHtml =
                        `<a href="${p.url}" target="_blank" class="project-link">🔗 查看项目</a>`;
                }

                html += `
                    <div class="project-card" data-id="${p._id}">
                        <div class="project-cover">${coverHtml}</div>
                        <div class="project-body">
                            <span class="project-type">${p.type || '其他'}</span>
                            <div class="project-title">${p.title}</div>
                            <div class="project-desc">${p.desc || '暂无描述'}</div>
                            ${tagsHtml ? `<div class="project-tags">${tagsHtml}</div>` : ''}
                            ${linkHtml}
                            <div class="project-actions">
                                <button class="btn btn-sm btn-outline edit-btn" data-id="${p._id}">✏️ 编辑</button>
                                <button class="btn btn-sm btn-danger delete-btn" data-id="${p._id}">🗑️ 删除</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        async function addProject(data) {
            if (!currentUser) return;
            const doc = {
                userId: currentUser.uid,
                title: data.title,
                type: data.type || '其他',
                desc: data.desc || '',
                tags: data.tags || [],
                url: data.url || '',
                image: data.image || '',
                createdAt: Date.now()
            };
            const res = await db.collection('projects').add(doc);
            return res.id;
        }

        async function updateProject(id, data) {
            await db.collection('projects').doc(id).update({
                title: data.title,
                type: data.type || '其他',
                desc: data.desc || '',
                tags: data.tags || [],
                url: data.url || '',
                image: data.image || ''
            });
        }

        async function deleteProject(id) {
            if (!confirm('确定删除这个作品吗？')) return;
            await db.collection('projects').doc(id).remove();
            await loadProjects();
        }

        // ============================================================
        // 模态框
        // ============================================================
        function openModal(projectData = null) {
            currentImageData = '';
            previewContainer.style.display = 'none';
            previewImg.src = '';

            if (projectData) {
                modalTitle.textContent = '编辑作品';
                editIdInput.value = projectData._id;
                formTitle.value = projectData.title || '';
                formType.value = projectData.type || '其他';
                formDesc.value = projectData.desc || '';
                formTags.value = (projectData.tags || []).join(', ');
                formUrl.value = projectData.url || '';
                if (projectData.image) {
                    currentImageData = projectData.image;
                    previewImg.src = projectData.image;
                    previewContainer.style.display = 'block';
                    formImageUrl.value = '';
                } else {
                    formImageUrl.value = '';
                }
                submitBtn.textContent = '更新作品';
            } else {
                modalTitle.textContent = '添加作品';
                editIdInput.value = '';
                projectForm.reset();
                formType.value = '网站';
                submitBtn.textContent = '保存作品';
                formImageUrl.value = '';
                previewContainer.style.display = 'none';
            }
            modalOverlay.classList.add('active');
            formImageFile.value = '';
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
        }

        formImageUrl.addEventListener('input', function() {
            const url = this.value.trim();
            if (url && (url.startsWith('http') || url.startsWith('data:image'))) {
                currentImageData = url;
                previewImg.src = url;
                previewContainer.style.display = 'block';
            } else {
                previewContainer.style.display = 'none';
            }
        });

        formImageFile.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            compressImage(file, 800, 0.7, function(base64) {
                currentImageData = base64;
                previewImg.src = base64;
                previewContainer.style.display = 'block';
                formImageUrl.value = '';
            });
        });

        function compressImage(file, maxWidth, quality, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    if (width > maxWidth) {
                        height = (maxWidth / width) * height;
                        width = maxWidth;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    const dataUrl = canvas.toDataURL('image/jpeg', quality);
                    callback(dataUrl);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        projectForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = formTitle.value.trim();
            if (!title) {
                alert('请填写作品名称');
                return;
            }
            const id = editIdInput.value;
            const data = {
                title: title,
                type: formType.value,
                desc: formDesc.value.trim(),
                tags: formTags.value.trim() ? formTags.value.split(',').map(s => s.trim()).filter(Boolean) :
                    [],
                url: formUrl.value.trim(),
                image: currentImageData || formImageUrl.value.trim() || ''
            };
            try {
                if (id) {
                    await updateProject(id, data);
                } else {
                    await addProject(data);
                }
                closeModal();
                await loadProjects();
            } catch (err) {
                alert('保存失败：' + err.message);
            }
        });

        cancelBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        addBtn.addEventListener('click', () => openModal(null));

        // 编辑/删除事件
        grid.addEventListener('click', function(e) {
            const target = e.target.closest('button');
            if (!target) return;
            if (target.classList.contains('edit-btn')) {
                const id = target.dataset.id;
                const project = allProjects.find(p => p._id === id);
                if (project) openModal(project);
            }
            if (target.classList.contains('delete-btn')) {
                const id = target.dataset.id;
                deleteProject(id);
            }
        });

        // ============================================================
        // 导出/导入备份
        // ============================================================
        exportBtn.addEventListener('click', function() {
            const data = JSON.stringify(allProjects, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `我的作品集_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        });

        importBtn.addEventListener('click', () => importFileInput.click());

        importFileInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(ev) {
                try {
                    const imported = JSON.parse(ev.target.result);
                    if (!Array.isArray(imported)) {
                        alert('无效的备份文件');
                        return;
                    }
                    if (!confirm(`即将导入 ${imported.length} 个作品，会添加到你的作品列表中。确定吗？`)) {
                        return;
                    }
                    for (const item of imported) {
                        await addProject({
                            title: item.title || '未命名',
                            type: item.type || '其他',
                            desc: item.desc || '',
                            tags: item.tags || [],
                            url: item.url || '',
                            image: item.image || ''
                        });
                    }
                    await loadProjects();
                    alert('导入成功！');
                } catch (err) {
                    alert('文件解析失败：' + err.message);
                }
            };
            reader.readAsText(file);
            this.value = '';
        });

        console.log('✅ CloudBase 应用已启动！');
        console.log('📌 当前环境 ID:', ENV_ID);
    </script>
</body>
</html>
