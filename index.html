<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灵感工坊 · 作品管理</title>
    <style>
        /* ---------- 全局 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0b0d15;
            color: #e5e9f0;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            background: linear-gradient(145deg, #0b0d15 0%, #1a1e2f 100%);
            background-attachment: fixed;
        }
        .app-wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ---------- 导航 ---------- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 2rem;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #b6c8ff, #8a6cff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .toolbar {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        /* ---------- 按钮 ---------- */
        .btn {
            padding: 0.6rem 1.6rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: all 0.25s ease;
            background: #2a2f45;
            color: #d0d9f0;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6f55e0, #8a6cff);
            color: #fff;
            box-shadow: 0 4px 14px rgba(138, 108, 255, 0.3);
        }
        .btn-primary:hover {
            transform: scale(1.04) translateY(-2px);
            box-shadow: 0 8px 24px rgba(138, 108, 255, 0.45);
        }
        .btn-danger {
            background: #c0392b;
            color: #fff;
        }
        .btn-danger:hover {
            background: #e74c3c;
            transform: scale(1.04);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.06);
        }
        .btn-sm {
            padding: 0.3rem 1rem;
            font-size: 0.8rem;
        }
        .btn-block {
            width: 100%;
            justify-content: center;
        }

        /* ---------- 统计 & 空状态 ---------- */
        .stats {
            color: #7a89aa;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #7a89aa;
        }
        .empty-state .big-icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 1rem;
        }
        .empty-state h3 {
            color: #e5e9f0;
            margin-bottom: 0.5rem;
        }

        /* ---------- 作品网格 ---------- */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin-top: 0.5rem;
        }

        .project-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .project-card:hover {
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(138, 108, 255, 0.25);
            box-shadow: 0 12px 30px -12px rgba(0, 0, 0, 0.6);
        }

        .project-cover {
            width: 100%;
            height: 180px;
            background: #1a1e2f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            overflow: hidden;
            flex-shrink: 0;
        }
        .project-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .project-cover .placeholder-icon {
            opacity: 0.3;
        }

        .project-body {
            padding: 1.2rem 1.4rem 1.4rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .project-type {
            display: inline-block;
            font-size: 0.7rem;
            background: rgba(138, 108, 255, 0.15);
            color: #b6a6ff;
            padding: 0.15rem 0.8rem;
            border-radius: 20px;
            align-self: flex-start;
            margin-bottom: 0.5rem;
        }
        .project-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }
        .project-desc {
            font-size: 0.9rem;
            color: #8e9bbe;
            line-height: 1.5;
            flex: 1;
            margin-bottom: 0.8rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 0.8rem;
        }
        .project-tags span {
            background: rgba(255, 255, 255, 0.06);
            padding: 0.1rem 0.7rem;
            border-radius: 12px;
            font-size: 0.7rem;
            color: #a4b0cc;
        }
        .project-link {
            color: #8a6cff;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.8rem;
            word-break: break-all;
        }
        .project-link:hover {
            text-decoration: underline;
        }
        .project-actions {
            display: flex;
            gap: 0.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 0.8rem;
            margin-top: auto;
        }

        /* ---------- 模态框 ---------- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #1a1e2f;
            border-radius: 2rem;
            max-width: 560px;
            width: 100%;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }
        .modal label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #a4b0cc;
            margin-bottom: 0.3rem;
            margin-top: 1rem;
        }
        .modal input,
        .modal select,
        .modal textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border 0.2s;
        }
        .modal input:focus,
        .modal select:focus,
        .modal textarea:focus {
            border-color: #8a6cff;
        }
        .modal textarea {
            min-height: 80px;
            resize: vertical;
        }
        .modal .file-input-wrapper {
            position: relative;
        }
        .modal .file-input-wrapper input[type="file"] {
            padding: 0.5rem 0;
            background: transparent;
            border: none;
            color: #a4b0cc;
        }
        .modal .preview-img {
            margin-top: 0.5rem;
            max-height: 120px;
            border-radius: 0.8rem;
            overflow: hidden;
            display: none;
        }
        .modal .preview-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .modal .form-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.8rem;
        }
        .modal .form-actions .btn {
            flex: 1;
        }

        /* ---------- 响应式 ---------- */
        @media (max-width: 640px) {
            .navbar {
                flex-direction: column;
                align-items: stretch;
            }
            .modal {
                padding: 1.5rem;
            }
            .project-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        @media (max-width: 420px) {
            .project-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <!-- 导航栏 -->
        <header class="navbar">
            <div class="logo">✦ 灵感工坊</div>
            <div class="toolbar">
                <button class="btn btn-outline btn-sm" id="exportBtn">📥 导出备份</button>
                <button class="btn btn-outline btn-sm" id="importBtn">📤 导入备份</button>
                <button class="btn btn-primary" id="addBtn">＋ 添加作品</button>
            </div>
            <input type="file" id="importFileInput" accept=".json" style="display:none" />
        </header>

        <!-- 统计 -->
        <div class="stats" id="statsText">共 0 个作品</div>

        <!-- 作品网格 -->
        <div class="project-grid" id="projectGrid">
            <!-- 由 JS 动态渲染 -->
        </div>

        <!-- 空状态（默认隐藏） -->
        <div class="empty-state" id="emptyState" style="display:none;">
            <span class="big-icon">🖼️</span>
            <h3>还没有作品</h3>
            <p>点击「添加作品」开始记录你的创作吧！</p>
        </div>

        <!-- ====== 模态框（添加 / 编辑） ====== -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal">
                <div class="modal-title" id="modalTitle">添加作品</div>
                <form id="projectForm">
                    <input type="hidden" id="editId" value="" />

                    <label for="formTitle">作品名称 *</label>
                    <input type="text" id="formTitle" placeholder="例如：个人品牌官网" required />

                    <label for="formType">作品类型</label>
                    <select id="formType">
                        <option value="网站">🌐 网站</option>
                        <option value="App">📱 App</option>
                        <option value="设计">🎨 设计</option>
                        <option value="文章">✍️ 文章</option>
                        <option value="视频">🎬 视频</option>
                        <option value="音乐">🎵 音乐</option>
                        <option value="其他">📦 其他</option>
                    </select>

                    <label for="formDesc">简短描述</label>
                    <textarea id="formDesc" placeholder="简单介绍这个作品..."></textarea>

                    <label for="formTags">技术标签（用逗号分隔）</label>
                    <input type="text" id="formTags" placeholder="例如：React, Figma, Tailwind" />

                    <label for="formUrl">项目链接（可选）</label>
                    <input type="url" id="formUrl" placeholder="https://example.com" />

                    <label for="formImage">封面图片（支持上传或粘贴 URL）</label>
                    <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
                        <input type="url" id="formImageUrl" placeholder="https://... 图片地址" style="flex:1;" />
                        <label class="btn btn-outline btn-sm" style="cursor:pointer; padding:0.6rem 1.2rem; background:#2a2f45;">
                            📁 上传图片
                            <input type="file" id="formImageFile" accept="image/*" style="display:none;" />
                        </label>
                    </div>
                    <div class="preview-img" id="formImagePreview">
                        <img id="previewImg" src="" alt="封面预览" />
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-outline" id="cancelBtn">取消</button>
                        <button type="submit" class="btn btn-primary" id="submitBtn">保存作品</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ---------- 数据层 ----------
            const STORAGE_KEY = 'my_portfolio_projects';
            let projects = [];

            // 加载本地数据
            function loadProjects() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try {
                        projects = JSON.parse(stored);
                        // 确保每个项目都有 id
                        projects = projects.filter(p => p.id);
                    } catch (e) {
                        projects = [];
                    }
                } else {
                    // 首次使用，添加几个示例
                    projects = [{
                        id: Date.now() + 1,
                        title: '品牌视觉系统',
                        type: '设计',
                        desc: '极简主义与色彩心理学的落地实践，包含完整的VI手册。',
                        tags: ['Figma', 'Adobe', 'Branding'],
                        url: 'https://behance.net',
                        image: ''
                    }, {
                        id: Date.now() + 2,
                        title: '智能数据看板',
                        type: '网站',
                        desc: '实时数据可视化仪表盘，支持多端自适应。',
                        tags: ['Vue', 'D3.js', 'ECharts'],
                        url: 'https://demo.com',
                        image: ''
                    }];
                    saveProjects();
                }
                render();
            }

            function saveProjects() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
                render();
            }

            // ---------- 渲染 ----------
            const grid = document.getElementById('projectGrid');
            const emptyState = document.getElementById('emptyState');
            const statsText = document.getElementById('statsText');

            function render() {
                if (projects.length === 0) {
                    grid.innerHTML = '';
                    emptyState.style.display = 'block';
                    statsText.textContent = '共 0 个作品';
                    return;
                }
                emptyState.style.display = 'none';
                statsText.textContent = `共 ${projects.length} 个作品`;

                // 按 id 倒序排列（最新的在前）
                const sorted = [...projects].sort((a, b) => b.id - a.id);

                let html = '';
                sorted.forEach(p => {
                    const typeEmoji = {
                        '网站': '🌐',
                        'App': '📱',
                        '设计': '🎨',
                        '文章': '✍️',
                        '视频': '🎬',
                        '音乐': '🎵',
                        '其他': '📦'
                    } [p.type] || '📦';

                    // 封面处理
                    let coverHtml = '';
                    if (p.image && p.image.startsWith('data:image')) {
                        coverHtml =
                            `<img src="${p.image}" alt="${p.title}" />`;
                    } else if (p.image && p.image.startsWith('http')) {
                        coverHtml =
                            `<img src="${p.image}" alt="${p.title}" onerror="this.style.display='none'" />`;
                    } else {
                        coverHtml =
                            `<span class="placeholder-icon">${typeEmoji}</span>`;
                    }

                    // 标签
                    let tagsHtml = '';
                    if (p.tags && p.tags.length) {
                        tagsHtml = p.tags.map(t =>
                            `<span>${t.trim()}</span>`
                        ).join('');
                    }

                    // 链接
                    let linkHtml = '';
                    if (p.url && p.url.trim()) {
                        linkHtml =
                            `<a href="${p.url}" target="_blank" class="project-link">🔗 查看项目</a>`;
                    }

                    html += `
                        <div class="project-card" data-id="${p.id}">
                            <div class="project-cover">${coverHtml}</div>
                            <div class="project-body">
                                <span class="project-type">${p.type || '其他'}</span>
                                <div class="project-title">${p.title}</div>
                                <div class="project-desc">${p.desc || '暂无描述'}</div>
                                ${tagsHtml ? `<div class="project-tags">${tagsHtml}</div>` : ''}
                                ${linkHtml}
                                <div class="project-actions">
                                    <button class="btn btn-sm btn-outline edit-btn" data-id="${p.id}">✏️ 编辑</button>
                                    <button class="btn btn-sm btn-danger delete-btn" data-id="${p.id}">🗑️ 删除</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                grid.innerHTML = html;
            }

            // ---------- CRUD 操作 ----------
            function addProject(data) {
                const newProject = {
                    id: Date.now(),
                    title: data.title.trim(),
                    type: data.type || '其他',
                    desc: data.desc ? data.desc.trim() : '',
                    tags: data.tags ? data.tags.split(',').map(s => s.trim()).filter(Boolean) : [],
                    url: data.url ? data.url.trim() : '',
                    image: data.image || ''
                };
                projects.push(newProject);
                saveProjects();
                return newProject;
            }

            function updateProject(id, data) {
                const index = projects.findIndex(p => p.id === id);
                if (index === -1) return false;
                const p = projects[index];
                p.title = data.title.trim();
                p.type = data.type || '其他';
                p.desc = data.desc ? data.desc.trim() : '';
                p.tags = data.tags ? data.tags.split(',').map(s => s.trim()).filter(Boolean) : [];
                p.url = data.url ? data.url.trim() : '';
                if (data.image) p.image = data.image;
                saveProjects();
                return true;
            }

            function deleteProject(id) {
                if (!confirm('确定要删除这个作品吗？')) return;
                projects = projects.filter(p => p.id !== id);
                saveProjects();
            }

            // ---------- 模态框逻辑 ----------
            const overlay = document.getElementById('modalOverlay');
            const modalTitle = document.getElementById('modalTitle');
            const form = document.getElementById('projectForm');
            const editIdInput = document.getElementById('editId');
            const titleInput = document.getElementById('formTitle');
            const typeSelect = document.getElementById('formType');
            const descInput = document.getElementById('formDesc');
            const tagsInput = document.getElementById('formTags');
            const urlInput = document.getElementById('formUrl');
            const imageUrlInput = document.getElementById('formImageUrl');
            const imageFileInput = document.getElementById('formImageFile');
            const previewContainer = document.getElementById('formImagePreview');
            const previewImg = document.getElementById('previewImg');
            const submitBtn = document.getElementById('submitBtn');
            const cancelBtn = document.getElementById('cancelBtn');

            let currentImageData = ''; // 暂存图片 base64 或 url

            function openModal(projectData = null) {
                currentImageData = '';
                previewContainer.style.display = 'none';
                previewImg.src = '';

                if (projectData) {
                    // 编辑模式
                    modalTitle.textContent = '编辑作品';
                    editIdInput.value = projectData.id;
                    titleInput.value = projectData.title || '';
                    typeSelect.value = projectData.type || '其他';
                    descInput.value = projectData.desc || '';
                    tagsInput.value = (projectData.tags || []).join(', ');
                    urlInput.value = projectData.url || '';
                    if (projectData.image) {
                        currentImageData = projectData.image;
                        previewImg.src = projectData.image;
                        previewContainer.style.display = 'block';
                        imageUrlInput.value = '';
                    } else {
                        imageUrlInput.value = '';
                    }
                    submitBtn.textContent = '更新作品';
                } else {
                    // 新增模式
                    modalTitle.textContent = '添加作品';
                    editIdInput.value = '';
                    form.reset();
                    typeSelect.value = '网站';
                    submitBtn.textContent = '保存作品';
                    imageUrlInput.value = '';
                    previewContainer.style.display = 'none';
                }
                overlay.classList.add('active');
                // 清空文件选择
                imageFileInput.value = '';
            }

            function closeModal() {
                overlay.classList.remove('active');
            }

            // 预览图片（从 URL）
            imageUrlInput.addEventListener('input', function() {
                const url = this.value.trim();
                if (url && (url.startsWith('http') || url.startsWith('data:image'))) {
                    currentImageData = url;
                    previewImg.src = url;
                    previewContainer.style.display = 'block';
                } else {
                    previewContainer.style.display = 'none';
                }
            });

            // 预览图片（从文件上传 + 压缩）
            imageFileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                // 压缩图片
                compressImage(file, 800, 0.7, function(base64) {
                    currentImageData = base64;
                    previewImg.src = base64;
                    previewContainer.style.display = 'block';
                    imageUrlInput.value = ''; // 清空 URL 输入
                });
            });

            // 压缩图片函数
            function compressImage(file, maxWidth, quality, callback) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = (maxWidth / width) * height;
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const dataUrl = canvas.toDataURL('image/jpeg', quality);
                        callback(dataUrl);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }

            // ---------- 表单提交 ----------
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                const title = titleInput.value.trim();
                if (!title) {
                    alert('请填写作品名称');
                    return;
                }

                const id = editIdInput.value ? Number(editIdInput.value) : null;
                const data = {
                    title: title,
                    type: typeSelect.value,
                    desc: descInput.value.trim(),
                    tags: tagsInput.value.trim(),
                    url: urlInput.value.trim(),
                    image: currentImageData || ''
                };

                // 如果当前没有图片，但 URL 输入框有值，取 URL 输入框
                if (!data.image && imageUrlInput.value.trim()) {
                    data.image = imageUrlInput.value.trim();
                }

                if (id) {
                    updateProject(id, data);
                } else {
                    addProject(data);
                }
                closeModal();
            });

            // ---------- 事件绑定 ----------
            document.getElementById('addBtn').addEventListener('click', function() {
                openModal(null);
            });

            cancelBtn.addEventListener('click', closeModal);

            // 点击遮罩关闭
            overlay.addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });

            // 委托事件：编辑 / 删除
            grid.addEventListener('click', function(e) {
                const target = e.target.closest('button');
                if (!target) return;

                // 编辑
                if (target.classList.contains('edit-btn')) {
                    const id = Number(target.dataset.id);
                    const project = projects.find(p => p.id === id);
                    if (project) openModal(project);
                }
                // 删除
                if (target.classList.contains('delete-btn')) {
                    const id = Number(target.dataset.id);
                    deleteProject(id);
                }
            });

            // ---------- 导出 / 导入备份 ----------
            document.getElementById('exportBtn').addEventListener('click', function() {
                const data = JSON.stringify(projects, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `我的作品集_${new Date().toISOString().slice(0,10)}.json`;
                a.click();
                URL.revokeObjectURL(url);
            });

            document.getElementById('importBtn').addEventListener('click', function() {
                document.getElementById('importFileInput').click();
            });

            document.getElementById('importFileInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        if (Array.isArray(imported) && imported.length >= 0) {
                            if (confirm(`即将导入 ${imported.length} 个作品，会覆盖当前所有数据，确定吗？`)) {
                                projects = imported;
                                saveProjects();
                                alert('导入成功！');
                            }
                        } else {
                            alert('无效的备份文件');
                        }
                    } catch (err) {
                        alert('文件解析失败，请确认是有效的 JSON 备份。');
                    }
                };
                reader.readAsText(file);
                this.value = ''; // 允许重复选择同一文件
            });

            // ---------- 初始化 ----------
            loadProjects();

        })();
    </script>
</body>
</html>
